<!DOCTYPE html>
<html>
    <head>
        <title>Sign In</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <!--
            name="viewport" - defines viewport settings
            content="width=device-width" - matches width with device 
            initial-scale=1 - sets zoom level to 100%       
        -->
        <link rel="stylesheet" href="SignInStyle.chatmode.css">
    </head>
    <body>
        <form>
                First Name: <input type="text" name="FirstName" placeholder="Enter First Name">
                <br/>
                Last Name: <input type="text" name="LastName" placeholder="Enter Last Name">
                <br/>
                <input type="submit" value="Login">
        </form>
    </body>
</html>
